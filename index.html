<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击跳转卡片</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            padding: 20px;
        }

        /* 链接重置 */
        .card-link {
            text-decoration: none;
            color: inherit;
        }

        .card {
            background: white;
            width: 260px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            text-align: center;
            /* 丝滑过渡效果 */
            transition: all 0.3s ease;
            cursor: pointer; /* 鼠标变成小手形状 */
        }

        /* 鼠标悬停效果 */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border: 1px solid #007bff; /* 可选：悬停时加个淡蓝色边框 */
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #4facfe; /* 给一个漂亮的渐变背景 */
            background-image: linear-gradient(120deg, #4facfe 0%, #00f2fe 100%);
            margin: 0 auto 20px;
        }

        h2 { margin: 0 0 10px 0; color: #333; }
        p { margin: 0; color: #666; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 第一个卡片 -->
        <a href="https://www.google.com" target="_blank" class="card-link">
            <div class="card">
                <div class="profile-img"></div>
                <h2>谷歌搜索</h2>
                <p>点击这里去探索世界，在新窗口中打开。</p>
            </div>
        </a>

        <!-- 第二个卡片 -->
        <a href="https://github.com" target="_blank" class="card-link">
            <div class="card">
                <div class="profile-img"></div>
                <h2>GitHub</h2>
                <p>这是全世界最大的代码托管平台，也是我的家。</p>
            </div>
        </a>

        <!-- 第三个卡片 -->
        <a href="test1.html" target="_blank" class="card-link">
            <div class="card">
                <div class="profile-img"></div>
                <h2>test1</h2>
                <p>ceshi1</p>
            </div>
        </a>

        <!-- 第四个卡片 -->
        <a href="test2.html" target="_blank" class="card-link">
            <div class="card">
                <div class="profile-img"></div>
                <h2>test2</h2>
                <p>ceshi2</p>
            </div>
        </a>
        
    </div>

</body>
</html>
